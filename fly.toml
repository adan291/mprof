# fly.toml app configuration file generated for mprof on 2024-09-01T14:10:40+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mprof'
primary_region = 'mad'

[build]

[env]
  PORT = '8081'

[processes]
  app = 'python main.py'

[[mounts]]
  source = 'app_data_mprof'
  destination = '/data'

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8081
  processes = ['app']

  [[services.ports]]
    port = 81
    handlers = ['http']

  [[services.ports]]
    port = 442
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '1s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
